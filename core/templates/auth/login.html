{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — มังคุด สัตวแพทย์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1E272E 0%, #2D3436 50%, #0D1B2A 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -30%; right: -15%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(108,92,231,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -20%; left: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,206,201,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      padding: 44px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      width: 72px; height: 72px;
      border-radius: 16px;
      object-fit: contain;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #2D3436;
      margin-bottom: 4px;
    }

    .login-header p {
      font-size: 14px;
      color: #636E72;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2D3436;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #B2BEC3;
      font-size: 15px;
      transition: color 0.3s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: 2px solid #E9ECEF;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #2D3436;
      outline: none;
      transition: all 0.3s;
    }

    .input-wrapper input:focus {
      border-color: #6C5CE7;
      box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
    }

    .input-wrapper input:focus + i,
    .input-wrapper input:focus ~ i {
      color: #6C5CE7;
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6C5CE7, #5A4BD1);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(108,92,231,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(108,92,231,0.45);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #636E72;
    }

    .login-footer a {
      color: #6C5CE7;
      font-weight: 600;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert-danger {
      background: rgba(225,112,85,0.1);
      color: #E17055;
      border: 1px solid rgba(225,112,85,0.2);
    }

    .alert-success {
      background: rgba(0,184,148,0.1);
      color: #00B894;
      border: 1px solid rgba(0,184,148,0.2);
    }

    .back-home {
      text-align: center;
      margin-top: 20px;
    }

    .back-home a {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      text-decoration: none;
    }

    .back-home a:hover {
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="{% static 'images/logo-removebg-preview.png' %}" alt="Mangkud Vet" class="login-logo">
        <h1>เข้าสู่ระบบ</h1>
        <p>Mangkud Veterinary Clinic</p>
      </div>

      {% if error %}
      <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      {% if success %}
      <div class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ success }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="form-group">
          <label>ชื่อผู้ใช้</label>
          <div class="input-wrapper">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <i class="fas fa-user"></i>
          </div>
        </div>

        <div class="form-group">
          <label>รหัสผ่าน</label>
          <div class="input-wrapper">
            <input type="password" name="password" placeholder="Password" required>
            <i class="fas fa-lock"></i>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
        </button>
      </form>

      <div class="login-footer">
        ยังไม่มีบัญชี? <a href="{% url 'register' %}">สมัครสมาชิก</a>
      </div>
    </div>

    <div class="back-home">
      <a href="{% url 'home' %}"><i class="fas fa-arrow-left"></i> กลับหน้าแรก</a>
    </div>
  </div>

</body>
</html>
