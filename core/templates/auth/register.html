{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก — มังคุด สัตวแพทย์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1E272E 0%, #2D3436 50%, #0D1B2A 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -30%; left: -15%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(0,206,201,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -20%; right: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(108,92,231,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .register-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      padding: 20px;
    }

    .register-card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .register-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .register-logo {
      width: 64px; height: 64px;
      border-radius: 14px;
      object-fit: contain;
      margin-bottom: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .register-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #2D3436;
      margin-bottom: 4px;
    }

    .register-header p {
      font-size: 13px;
      color: #636E72;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2D3436;
      margin-bottom: 6px;
    }

    .form-group label .req { color: #E17055; }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #B2BEC3;
      font-size: 14px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 2px solid #E9ECEF;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #2D3436;
      outline: none;
      transition: all 0.3s;
    }

    .input-wrapper input:focus {
      border-color: #6C5CE7;
      box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
    }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00CEC9, #00B894);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,206,201,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0,206,201,0.45);
    }

    .register-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: #636E72;
    }

    .register-footer a {
      color: #6C5CE7;
      font-weight: 600;
      text-decoration: none;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert-danger {
      background: rgba(225,112,85,0.1);
      color: #E17055;
      border: 1px solid rgba(225,112,85,0.2);
    }

    .back-home {
      text-align: center;
      margin-top: 18px;
    }

    .back-home a {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      text-decoration: none;
    }

    .back-home a:hover {
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="register-card">
      <div class="register-header">
        <img src="{% static 'images/logo-removebg-preview.png' %}" alt="Mangkud Vet" class="register-logo">
        <h1>สมัครสมาชิก</h1>
        <p>สร้างบัญชีเพื่อเข้าใช้ระบบจัดการคลินิก</p>
      </div>

      {% if error %}
      <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}

        <div class="form-row">
          <div class="form-group">
            <label>ชื่อ</label>
            <div class="input-wrapper">
              <input type="text" name="first_name" placeholder="ชื่อ" value="{{ form_data.first_name|default:'' }}">
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="form-group">
            <label>นามสกุล</label>
            <div class="input-wrapper">
              <input type="text" name="last_name" placeholder="นามสกุล" value="{{ form_data.last_name|default:'' }}">
              <i class="fas fa-user"></i>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>ชื่อผู้ใช้ <span class="req">*</span></label>
          <div class="input-wrapper">
            <input type="text" name="username" placeholder="Username" required value="{{ form_data.username|default:'' }}">
            <i class="fas fa-at"></i>
          </div>
        </div>

        <div class="form-group">
          <label>อีเมล</label>
          <div class="input-wrapper">
            <input type="email" name="email" placeholder="email@example.com" value="{{ form_data.email|default:'' }}">
            <i class="fas fa-envelope"></i>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>รหัสผ่าน <span class="req">*</span></label>
            <div class="input-wrapper">
              <input type="password" name="password" placeholder="อย่างน้อย 6 ตัว" required>
              <i class="fas fa-lock"></i>
            </div>
          </div>

          <div class="form-group">
            <label>ยืนยันรหัสผ่าน <span class="req">*</span></label>
            <div class="input-wrapper">
              <input type="password" name="password2" placeholder="กรอกอีกครั้ง" required>
              <i class="fas fa-lock"></i>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-register">
          <i class="fas fa-user-plus"></i> สมัครสมาชิก
        </button>
      </form>

      <div class="register-footer">
        มีบัญชีอยู่แล้ว? <a href="{% url 'login' %}">เข้าสู่ระบบ</a>
      </div>
    </div>

    <div class="back-home">
      <a href="{% url 'home' %}"><i class="fas fa-arrow-left"></i> กลับหน้าแรก</a>
    </div>
  </div>

</body>
</html>
