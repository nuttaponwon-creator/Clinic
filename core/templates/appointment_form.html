{% extends "base.html" %}

{% block title %}สร้างนัดหมาย{% endblock %}
{% block page_title %}สร้างนัดหมายใหม่{% endblock %}
{% block page_subtitle %}กรอกข้อมูลนัดหมาย{% endblock %}

{% block content %}

<div class="data-card">
  <div class="data-card-header">
    <h2><i class="fas fa-calendar-plus"></i> ข้อมูลนัดหมาย</h2>
    <a href="{% url 'appointment_list' %}" class="btn btn-outline btn-sm">
      <i class="fas fa-arrow-left"></i> กลับ
    </a>
  </div>
  <div style="padding: 24px;">
    <form method="POST" action="">
      {% csrf_token %}
      <div class="form-grid">

        <div class="form-group">
          <label>สัตว์เลี้ยง <span class="required">*</span></label>
          <select name="pet_id" class="form-control" required>
            <option value="">-- เลือกสัตว์เลี้ยง --</option>
            {% for pet in pets %}
              <option value="{{ pet.pet_id }}">{{ pet.name }} ({{ pet.owner_name }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>สัตวแพทย์ <span class="required">*</span></label>
          <select name="vet_id" class="form-control" required>
            <option value="">-- เลือกสัตวแพทย์ --</option>
            {% for vet in vets %}
              <option value="{{ vet.vet_id }}">{{ vet.first_name }} {{ vet.last_name }}{% if vet.specialization %} ({{ vet.specialization }}){% endif %}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>วันที่-เวลานัด <span class="required">*</span></label>
          <div style="display: flex; gap: 10px;">
            <input type="date" name="appt_date" class="form-control" required style="flex: 1;">
            <select name="appt_time" class="form-control" required style="flex: 1;">
                <option value="">กรุณาเลือกเวลา</option>
                <optgroup label="ก่อนเที่ยง">
                    <option value="09:00:00">9:00 - 10:00</option>
                    <option value="10:00:00">10:00 - 11:00</option>
                    <option value="11:00:00">11:00 - 12:00</option>
                </optgroup>
                <optgroup label="หลังเที่ยง">
                    <option value="13:00:00">13:00 - 14:00</option>
                    <option value="14:00:00">14:00 - 15:00</option>
                    <option value="15:00:00">15:00 - 16:00</option>
                </optgroup>
                <optgroup label="ช่วงเย็น">
                    <option value="16:00:00">16:00 - 17:00</option>
                    <option value="18:00:00">18:00 - 19:00</option>
                    <option value="19:00:00">19:00 - 20:00</option>
                </optgroup>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>เหตุผลนัด</label>
          <input type="text" name="reason" class="form-control" placeholder="เช่น ตรวจสุขภาพประจำปี, ฉีดวัคซีน">
        </div>

        <div class="form-group full-width">
          <label>หมายเหตุ</label>
          <textarea name="notes" class="form-control" rows="3" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> สร้างนัดหมาย
        </button>
        <a href="{% url 'appointment_list' %}" class="btn btn-outline">ยกเลิก</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
